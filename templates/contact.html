{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="container py-5">

  <div class="text-center mb-5">
    <h1 class="fw-bold">Contactez-nous</h1>
    <p class="text-muted">Nous vous répondons rapidement</p>
  </div>

  <div class="row g-4">

    <!-- FORMULAIRE -->
    <div class="col-md-6">
      <div class="p-4 bg-white shadow rounded-4">

        <form method="POST">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label">Nom complet</label>
            <input type="text" class="form-control rounded-3" name="name" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control rounded-3" name="email" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea class="form-control rounded-3" name="message" rows="5" required></textarea>
          </div>

          <button class="btn btn-dark w-100 rounded-3 py-2">
            Envoyer
          </button>

        </form>

      </div>
    </div>

    <!-- CONTACT RAPIDE -->
<div class="col-md-6">

  <div class="p-4 bg-white shadow rounded-4 h-100">

    <h4 class="mb-3 text-dark">Contact rapide</h4>

    <p>📍 Dakar, Sénégal</p>
    <p>📞 +221 76 801 58 58</p>
    <p>
  ✉️ 
  <a href="mailto:falloucity01@gmail.com?subject=Demande d'information&body=Bonjour,%0D%0AJe souhaite obtenir plus d'informations sur vos services."
   class="text-dark fw-semibold text-decoration-none">
  falloucity01@gmail.com
</a>
</p>

    <hr>

    <a href="https://wa.me/221768015858?text=Bonjour%20je%20souhaite%20avoir%20des%20infos"
       class="btn btn-success w-100 mb-2">
      💬 WhatsApp
    </a>

    <a href="tel:+221768015858"
       class="btn btn-outline-dark w-100">
      📞 Appeler maintenant
    </a>

    <hr>

    <small class="text-muted">
      Réponse rapide garantie
    </small>

  </div>
</div>

  <!-- MAP -->
  <div class="mt-5">
    <iframe
      src="https://www.google.com/maps?q=14.7462105,-17.5070652&z=17&output=embed"
      width="100%"
      height="350"
      style="border:0; border-radius:12px;">
    </iframe>
  </div>

</div>

{% endblock %}
