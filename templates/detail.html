{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="container my-5">
  <div class="row">

    <div class="col-md-6">
      <img src="{% static 'images/' %}{{ bien.image }}" class="img-fluid rounded">
    </div>

    <div class="col-md-6">
      <h2>{{ bien.titre }}</h2>
      <h4 class="text-success">{{ bien.prix }}</h4>
      <p>{{ bien.details }}</p>

      <a href="https://wa.me/771015858?text=Bonjour,%20je%20veux%20plus%20d'informations%20sur%20{{ bien.titre }}" 
         class="btn btn-success"
         target="_blank">
         Contacter sur WhatsApp
      </a>
    </div>

  </div>
</div>

{% endblock %}
