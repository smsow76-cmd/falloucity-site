{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Propriétés - FallouCity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">Toutes les propriétés</h2>
    <div class="row">
        {% for bien in biens %}
        <div class="col-md-4 mb-4">
            <div class="card h-100 shadow-sm">
                <img src="{% static 'images/'|add:bien.image %}" class="card-img-top" style="height:250px; object-fit:cover;">
                <div class="card-body">
                    <h5 class="card-title">{{ bien.titre }}</h5>
                    <p class="card-text">{{ bien.details }}</p>
                    <a href="{% url 'detail_propriete' bien.id %}" class="btn btn-primary">Voir détails</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
