{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Propriétés - FallouCity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-propriete {
            width: 100%;       /* occupe toute la largeur disponible */
            max-width: 500px;  /* limite la largeur sur grand écran */
            margin: 0 auto;    /* centre la carte sur grand écran */
        }
        .card-propriete img {
            height: 300px;     /* un peu plus haute que 250px */
            object-fit: cover;
        }
        @media (max-width: 768px) {
            .card-propriete {
                max-width: 100%; /* sur mobile la carte prend toute la largeur */
            }
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4 text-center">Toutes les propriétés</h2>
    <div class="row justify-content-center g-4">
        {% for bien in biens %}
        <div class="col-12 col-md-6 col-lg-4 d-flex justify-content-center">
            <div class="card card-propriete h-100 shadow-sm">
                <img src="{% static 'images/'|add:bien.image %}?v=2" class="card-img-top" alt="{{ bien.titre }}">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ bien.titre }}</h5>
                    <p class="card-text">{{ bien.details }}</p>
                    <div class="mt-auto">
                        <a href="{% url 'detail_propriete' bien.id %}" class="btn btn-primary w-100 mb-2">Voir détails</a>
                        <a href="https://wa.me/221771015858?text=Bonjour,%20je%20suis%20intéressé%20par%20{{ bien.titre }}" 
                           class="btn btn-success w-100" target="_blank">WhatsApp</a>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
