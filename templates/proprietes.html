{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="container my-5">
  <h1 class="mb-4 text-center text-md-start">Toutes nos propriétés</h1>

  <div class="row g-4">

    {% for bien in biens %}
    <div class="col-12 col-sm-6 col-md-4">
      <div class="card shadow-sm h-100">

        <!-- Image -->
        <img src="{% static 'images/'|add:bien.image %}" 
             class="card-img-top img-fluid" 
             alt="{{ bien.titre }}"
             style="height:250px; object-fit:cover;">

        <div class="card-body d-flex flex-column">

          <h5>
            {{ bien.titre }}
            <span class="badge bg-success">Vente</span>
          </h5>

          <p class="text-muted">{{ bien.details }}</p>

          <!-- BOUTONS -->
          <div class="mt-auto">
            <a href="{% url 'detail' bien.id %}" 
               class="btn btn-primary btn-sm w-100 mb-2">
               Voir détails
            </a>

            <a href="https://wa.me/771015858?text=Bonjour,%20je%20suis%20intéressé%20par%20{{ bien.titre }}" 
               class="btn btn-success btn-sm w-100" 
               target="_blank">
               WhatsApp
            </a>
          </div>

        </div>
      </div>
    </div>
    {% empty %}
    <div class="text-center">
      <p>Aucune propriété disponible.</p>
    </div>
    {% endfor %}

  </div>
</section>
{% endblock %}
