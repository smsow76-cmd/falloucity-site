{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Propriétés - FallouCity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Agrandir les cartes et images */
        .card-img-top {
            height: 300px; /* un peu plus grand que 250px */
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        /* Zoom image au survol */
        .card:hover .card-img-top {
            transform: scale(1.05);
        }

        /* Faire que chaque carte occupe toute la largeur sur mobile */
        @media (max-width: 767px) {
            .col-mobile-full {
                flex: 0 0 100%;
                max-width: 100%;
            }
        }

        /* Float WhatsApp/email bouton */
        .whatsapp-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: #25D366;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            z-index: 9999;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .whatsapp-float img {
            width: 35px;
            height: 35px;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">Toutes les propriétés</h2>
    <div class="row g-4">
        {% for bien in biens %}
        <div class="col-md-6 col-lg-4 col-mobile-full"> <!-- carte plus large sur mobile -->
            <div class="card h-100 shadow-sm">
                <img src="{% static 'images/'|add:bien.image %}?v=2" class="card-img-top">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ bien.titre }}</h5>
                    <p class="card-text">{{ bien.details }}</p>
                    <div class="mt-auto d-grid gap-2">
                        <a href="{% url 'detail_propriete' bien.id %}" class="btn btn-primary btn-sm w-100">
                            Voir détails
                        </a>
                        <a href="https://wa.me/221771015858?text=Bonjour,%20je%20suis%20intéressé%20par%20{{ bien.titre }}" 
                           class="btn btn-success btn-sm w-100" target="_blank">
                            WhatsApp
                        </a>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<!-- Floating WhatsApp/email -->
<a href="mailto:falloucity2026@gmail.com" class="whatsapp-float" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="Email">
</a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
