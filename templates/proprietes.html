{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Propriétés - FallouCity</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Images responsive et uniformes */
        .card-img-top {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-top-left-radius: 0.5rem;
            border-top-right-radius: 0.5rem;
        }

        /* Card hover effect */
        .card {
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* Responsive pour mobile */
        @media (max-width: 576px) {
            .card-img-top {
                height: 200px;
            }
        }

        /* Responsive pour tablette */
        @media (max-width: 768px) {
            .card-img-top {
                height: 250px;
            }
        }

        
        .btn-w-full {
            width: 100%;
        }

        
        .card-body {
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
<div class="container mt-4">
    <h2 class="mb-4 text-center">Toutes les propriétés</h2>
    <div class="row g-4">
        {% for bien in biens %}
        <div class="col-12 col-sm-6 col-md-4">
            <div class="card h-100 shadow-sm">
                <a href="{% url 'detail_propriete' bien.id %}">
                    <img src="{% static 'images/'|add:bien.image %}?v=2" class="card-img-top" alt="{{ bien.titre }}">
                </a>
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ bien.titre }}</h5>

                    <p class="card-text">{{ bien.details|truncatechars:120 }}...</p>

                    <div class="mt-auto">
                        <a href="{% url 'detail_propriete' bien.id %}" class="btn btn-primary btn-w-full mb-2">Voir détails</a>
                        <a href="https://wa.me/221768015858?text={{ 'Bonjour, je suis intéressé par ce bien : '|add:bien.titre|urlencode }}" 
                           class="btn btn-success btn-w-full" target="_blank">WhatsApp</a>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="text-center mt-5">
        <a href="{% url 'proprietes' %}" class="btn btn-dark btn-lg px-5">Voir plus de propriétés</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
