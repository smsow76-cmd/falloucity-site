{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Propriétés - FallouCity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">Toutes les propriétés</h2>

    <div class="row">
        {% for bien in biens %}
        <div class="col-12 mb-4">  <!-- Une carte par ligne -->
            <div class="card h-100 shadow-sm">
                <img src="{% static 'images/'|add:bien.image %}?v=2" 
                     class="card-img-top img-fluid" 
                     style="height:400px; object-fit:cover;">
                <div class="card-body">
                    <h5 class="card-title">{{ bien.titre }}</h5>
                    <p class="card-text">{{ bien.details }}</p>
                    <a href="{% url 'detail_propriete' bien.id %}" class="btn btn-primary w-100 mb-2">Voir détails</a>
                    <a href="https://wa.me/221771015858?text=Bonjour,%20je%20suis%20intéressé%20par%20{{ bien.titre }}" 
                       class="btn btn-success w-100" target="_blank">WhatsApp</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
